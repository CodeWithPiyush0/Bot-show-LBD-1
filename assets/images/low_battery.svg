<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 100" width="62" height="100">
  <defs>
    <linearGradient id="lb-silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f4f8"/>
      <stop offset="0.45" stop-color="#cbcbd6"/>
      <stop offset="1" stop-color="#8c8c9a"/>
    </linearGradient>
    <linearGradient id="lb-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6a5a"/>
      <stop offset="1" stop-color="#d62a1f"/>
    </linearGradient>
    <clipPath id="lb-clip"><rect x="8.5" y="9.5" width="45" height="87" rx="9.5"/></clipPath>
  </defs>

  <!-- terminal nub -->
  <rect x="22" y="0.6" width="18" height="8" rx="2.6" fill="url(#lb-silver)" stroke="#13111d" stroke-width="1.3"/>
  <!-- dark shell / outline -->
  <rect x="6" y="7" width="50" height="92" rx="12" fill="#13111d"/>

  <g clip-path="url(#lb-clip)">
    <!-- empty/dark body -->
    <rect x="8.5" y="9.5" width="45" height="87" fill="#201d33"/>
    <!-- metallic bands -->
    <rect x="8.5" y="9.5" width="45" height="16" fill="url(#lb-silver)"/>
    <rect x="8.5" y="80" width="45" height="17" fill="url(#lb-silver)"/>
    <!-- low charge: one red bar near the bottom -->
    <rect x="13" y="66" width="36" height="11" rx="2.5" fill="url(#lb-red)"/>
  </g>
</svg>
