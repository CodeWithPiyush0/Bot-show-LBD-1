<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bot Show - Activity Game</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/screen.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <!-- Game container: keeps the background and all game elements -->
    <main class="game" id="game">
        <div class="game__screen" id="screen">

            <!-- Spotlight beam focused on the center (orange) bot -->
            <img
                class="spotlight"
                src="assets/images/spotlight.svg"
                alt=""
                aria-hidden="true"
            />

            <!-- The three bots -->
            <img
                class="bot bot--purple"
                src="assets/images/Sahdow_Purple_Bot.svg"
                alt="Purple bot"
                data-bot="purple"
            />
            <img
                class="bot bot--orange"
                src="assets/images/orange_bot.svg"
                alt="Orange bot"
                data-bot="orange"
            />
            <img
                class="bot bot--white-blue"
                src="assets/images/White_blue_bot.svg"
                alt="White and blue bot"
                data-bot="white-blue"
            />

            <!-- Question banner at the top -->
            <div class="question">
                <img
                    class="question__template"
                    src="assets/images/Question_template.svg"
                    alt=""
                    aria-hidden="true"
                />
                <p class="question__text">Tap the bot to fix its batteries.</p>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="js/main.js" defer></script>
</body>
</html>
