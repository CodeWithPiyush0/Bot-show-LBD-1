<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bot Show - Activity Game</title>

    <!-- Fonts: Rajdhani -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <!-- Preload the start-screen image (the actual first paint) -->
    <link rel="preload" as="image" href="assets/images/Pre_LBD.webp" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/screen.css" />
    <link rel="stylesheet" href="css/screen2.css" />
    <link rel="stylesheet" href="css/screen3.css" />
    <link rel="stylesheet" href="css/screen4.css" />
    <link rel="stylesheet" href="css/part2.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <!-- Game container: keeps the background and all game elements -->
    <main class="game" id="game">
        <div class="game__screen" id="stage">

            <!-- ===== PRE-LBD - start screen ===== -->
            <section class="screen screen--pre is-active" id="screen-pre" data-screen="pre">
                <button class="play-btn" id="play-btn" type="button">Let's Play</button>
            </section>

            <!-- ===== SCREEN 1 - choose the bot ===== -->
            <section class="screen screen--1" id="screen-1" data-screen="1">

                <!-- Spotlight beam focused on the center (orange) bot -->
                <img
                    class="spotlight"
                    src="assets/images/spotlight.svg"
                    alt=""
                    aria-hidden="true"
                />

                <!-- Floor shadows & warm glow (recreated from Figma ellipses) -->
                <div class="floor floor--shadow floor--purple" aria-hidden="true"></div>
                <div class="floor floor--shadow floor--white" aria-hidden="true"></div>
                <div class="floor floor--shadow floor--orange" aria-hidden="true"></div>
                <div class="floor floor--glow" aria-hidden="true"></div>

                <!-- The three bots -->
                <img
                    class="bot bot--purple"
                    src="assets/images/Sahdow_Purple_Bot.webp"
                    alt="Purple bot"
                    data-bot="purple"
                />
                <img
                    class="bot bot--orange"
                    src="assets/images/orange_bot.webp"
                    alt="Orange bot"
                    data-bot="orange"
                />
                <img
                    class="bot bot--white-blue"
                    src="assets/images/White_blue_bot.webp"
                    alt="White and blue bot"
                    data-bot="white-blue"
                />

                <!-- Question banner at the top -->
                <div class="question">
                    <img
                        class="question__template"
                        src="assets/images/Question_template.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <video
                        class="question__avatar"
                        src="assets/videos/bite_talking.mp4"
                        muted
                        loop
                        autoplay
                        playsinline
                        preload="auto"
                        aria-hidden="true"
                    ></video>
                    <p class="question__text" data-text="Tap the bot to fix its batteries."></p>
                </div>

            </section>

            <!-- ===== SCREEN 2 - inside the bot (place the batteries) ===== -->
            <section class="screen screen--2" id="screen-2" data-screen="2">

                <!-- Gameplay content. Scaled down slightly while the
                     question banner is open, then back to normal. -->
                <div class="s2-content is-compact" id="s2-content">

                    <!-- Circuit-board panel (border + slots + connectors) -->
                    <img
                        class="panel"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <!-- Overlay exact original orange small slots so they don't turn green, and act as z-index covers -->
                    <img
                        class="panel panel--small-left"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <img
                        class="panel panel--small-right"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <img
                        class="panel panel--big"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />

                    <!-- Green glow overlay for the charged top slot.
                         Uses the standalone slot art so the glow hugs
                         its exact rounded shape. -->
                    <img
                        class="slot-glow slot-glow--big"
                        data-src="assets/images/Bigger_Slot.svg"
                        alt=""
                        aria-hidden="true"
                    />

                    <!-- Slot drop-zones (overlay the panel's recesses) -->
                    <div class="slot slot--big" data-slot="big" aria-hidden="true"></div>
                    <div class="slot slot--small-left" data-slot="small-left" aria-hidden="true"></div>
                    <div class="slot slot--small-right" data-slot="small-right" aria-hidden="true"></div>

                    <!-- Current flows through the orange connectors
                         (paths trace the exact connector centerlines). -->
                    <svg
                        class="charge-fx"
                        id="charge-fx"
                        viewBox="0 0 1920 1080"
                        preserveAspectRatio="none"
                        aria-hidden="true"
                    >
                        <g class="charge-glow">
                            <path d="M 661.5 547.7 L 750.5 418.3" />
                            <path d="M 1256 547.4 L 1174 417.6" />
                            <path d="M 853 636 L 1078 636" />
                        </g>
                        <!-- Travelling current pulses -->
                        <g class="charge-flow">
                            <path d="M 661.5 547.7 L 750.5 418.3" />
                            <path d="M 1256 547.4 L 1174 417.6" />
                            <path d="M 853 636 L 1078 636" />
                        </g>
                    </svg>

                    <!-- Battery trays at the bottom -->
                    <div class="tray tray--blue">
                        <div class="tray__inner"></div>
                        <div class="tray__deco tray__deco--top"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--bottom"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--left"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--right"><i></i><i></i><i></i></div>
                    </div>
                    <div class="tray tray--yellow">
                        <div class="tray__inner"></div>
                        <div class="tray__deco tray__deco--top"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--bottom"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--left"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--right"><i></i><i></i><i></i></div>
                    </div>

                    <!-- Batteries are injected here by js/batteries.js -->

                </div>

                <!-- Question banner: opens on entry, types the prompt,
                     holds, then closes back to just the mascot face. -->
                <div class="question" id="question-2">
                    <img
                        class="question__template"
                        src="assets/images/Question_template.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <video
                        class="question__avatar"
                        src="assets/videos/bite_talking.mp4"
                        muted
                        loop
                        autoplay
                        playsinline
                        preload="auto"
                        aria-hidden="true"
                    ></video>
                    <p class="question__text" data-text="Drag the batteries in a small slots."></p>
                </div>

            </section>

            <!-- ===== SCREEN 3 - the charged bot celebrates ===== -->
            <section class="screen screen--3" id="screen-3" data-screen="3">

                <!-- Spotlight on the bot -->
                <img
                    class="spotlight"
                    src="assets/images/spotlight.svg"
                    alt=""
                    aria-hidden="true"
                />

                <!-- Fully-charged bot (static image placeholder; swap for a
                     dancing video later). -->
                <div class="charged-bot">
                    <img
                        data-src="assets/images/orange_bot_charged.webp"
                        alt="The bot, fully charged"
                    />
                </div>

            </section>

            <!-- ===== SCREEN 4 - concept: 2 parts make a whole ===== -->
            <section class="screen screen--4" id="screen-4" data-screen="4">

                <div class="s4-content" id="s4-content">
                    <!-- Charged (green) circuit-board panel, same layering
                         as Screen 2's charged end state. Base panel is green;
                         the small-slot overlays keep the parts' slots orange;
                         the big-slot overlay is green (the whole). -->
                    <img
                        class="panel"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <img
                        class="panel panel--small-left"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <img
                        class="panel panel--small-right"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <img
                        class="panel panel--big is-green"
                        data-src="assets/images/battery_slots.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <!-- Green glow for the big (whole) slot -->
                    <img
                        class="slot-glow slot-glow--big"
                        data-src="assets/images/Bigger_Slot.svg"
                        alt=""
                        aria-hidden="true"
                    />
                    <!-- Glow overlays for the small (part) slots -->
                    <img
                        class="slot-glow slot-glow--small-left"
                        data-src="assets/images/Smaller_Slot.svg"
                        alt=""
                        aria-hidden="true"
                    />
                    <img
                        class="slot-glow slot-glow--small-right"
                        data-src="assets/images/Smaller_Slot.svg"
                        alt=""
                        aria-hidden="true"
                    />
                    <!-- Batteries injected by js/concept.js -->
                </div>

                <!-- Concept prompt banner -->
                <div class="question" id="question-4">
                    <img
                        class="question__template"
                        src="assets/images/Question_template.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <video
                        class="question__avatar"
                        src="assets/videos/bite_talking.mp4"
                        muted
                        loop
                        autoplay
                        playsinline
                        preload="auto"
                        aria-hidden="true"
                    ></video>
                    <p class="question__text" data-text="These 2 parts make this whole."></p>
                </div>

            </section>

            <!-- ================= PART 2 ================= -->

            <!-- ===== SCREEN 5 - overcharged bots intro ===== -->
            <section class="screen screen--5" id="screen-5" data-screen="5">

                <!-- The scene (bots + spotlight). Wrapped so the "little
                     zoom" can scale it without scaling the banner. -->
                <div class="s5-stage" id="s5-stage">
                    <img class="spotlight" src="assets/images/spotlight.svg" alt="" aria-hidden="true" />

                    <div class="floor floor--shadow floor--purple" aria-hidden="true"></div>
                    <div class="floor floor--shadow floor--white" aria-hidden="true"></div>
                    <div class="floor floor--shadow floor--orange" aria-hidden="true"></div>
                    <div class="floor floor--glow" aria-hidden="true"></div>

                    <img class="bot bot--oc-left" data-src="assets/images/Sahdow_Purple_Bot.webp" alt="Overcharged purple bot" />
                    <img class="bot bot--oc-center" data-src="assets/images/White_purple_bot.webp" alt="Overcharged bot" data-bot="center" />
                    <img class="bot bot--oc-right" data-src="assets/images/orange_bot_charged.webp" alt="Orange bot" />
                </div>

                <div class="question" id="question-5">
                    <img class="question__template" src="assets/images/Question_template.webp" alt="" aria-hidden="true" />
                    <video class="question__avatar" src="assets/videos/bite_talking.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true"></video>
                    <p class="question__text"
                        data-text="Oh no! A few bots have overcharged."
                        data-text2="Let's start fixing this bot."
                        data-text3="Let us split its batteries."></p>
                </div>

            </section>

            <!-- ===== SCREEN 6 - split the batteries (puzzle) ===== -->
            <section class="screen screen--6" id="screen-6" data-screen="6">

                <div class="s6-content" id="s6-content">
                    <img class="panel" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />
                    <img class="panel panel--small-left" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />
                    <img class="panel panel--small-right" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />
                    <img class="panel panel--big" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />

                    <img class="slot-glow slot-glow--big" data-src="assets/images/Bigger_Slot_Red.svg" alt="" aria-hidden="true" />

                    <div class="slot slot--big" data-slot="big" aria-hidden="true"></div>
                    <div class="slot slot--small-left" data-slot="small-left" aria-hidden="true"></div>
                    <div class="slot slot--small-right" data-slot="small-right" aria-hidden="true"></div>

                    <!-- Batteries injected by js/split.js (start in the big slot) -->
                </div>

                <div class="question" id="question-6">
                    <img class="question__template" src="assets/images/Question_template.webp" alt="" aria-hidden="true" />
                    <video class="question__avatar" src="assets/videos/bite_talking.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true"></video>
                    <p class="question__text"
                        data-text="Let us split its batteries."
                        data-text2="Drag the batteries to the small slots."></p>
                </div>

            </section>

            <!-- ===== SCREEN 7 - the fixed bot celebrates ===== -->
            <section class="screen screen--7" id="screen-7" data-screen="7">
                <img class="spotlight" src="assets/images/spotlight.svg" alt="" aria-hidden="true" />
                <div class="charged-bot">
                    <img data-src="assets/images/White_purple_bot_charged.webp" alt="The fixed bot" />
                </div>
            </section>

            <!-- ===== SCREEN 8 - concept: a whole is made of 2 parts ===== -->
            <section class="screen screen--8" id="screen-8" data-screen="8">

                <div class="s6-content" id="s8-content">
                    <img class="panel" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />
                    <img class="panel panel--small-left" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />
                    <img class="panel panel--small-right" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />
                    <img class="panel panel--big is-green" data-src="assets/images/battery_slots_white.webp" alt="" aria-hidden="true" />
                    <img class="slot-glow slot-glow--big is-green" data-src="assets/images/Bigger_Slot_Red.svg" alt="" aria-hidden="true" />
                    <img class="slot-glow slot-glow--small-left" data-src="assets/images/Smaller_Slot.svg" alt="" aria-hidden="true" />
                    <img class="slot-glow slot-glow--small-right" data-src="assets/images/Smaller_Slot.svg" alt="" aria-hidden="true" />
                    <!-- Batteries injected by js/concept.js (screen 8 variant) -->
                </div>

                <div class="question" id="question-8">
                    <img class="question__template" src="assets/images/Question_template.webp" alt="" aria-hidden="true" />
                    <video class="question__avatar" src="assets/videos/bite_talking.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true"></video>
                    <p class="question__text" data-text="This whole is made of these 2 parts."></p>
                </div>

            </section>

            <!-- ===== LEVEL TRANSITION SCREEN ===== -->
            <section class="screen screen--transition" id="screen-transition" data-screen="transition">
                <div class="transition-card">
                    <h1 class="transition-title" id="transition-title">Level 1 Completed!</h1>
                    <p class="transition-subtitle" id="transition-subtitle">Get ready for Level 2</p>
                    <button class="play-btn play-btn--transition" id="next-level-btn" type="button">Start Level 2</button>
                </div>
            </section>

        </div>
    </main>

    <!-- Scripts -->
    <script src="js/navigation.js" defer></script>
    <script src="js/concept.js" defer></script>
    <script src="js/part2.js" defer></script>
    <script src="js/intro.js" defer></script>
    <script src="js/batteries.js" defer></script>
    <script src="js/main.js" defer></script>
    <!-- TEMPORARY dev tool — remove this line and js/devmenu.js for production -->
    <script src="js/devmenu.js" defer></script>
    <!-- QA comment tool (activates only with ?qa=true) -->
    <script type="module" src="qa/qa-mode.js"></script>
</body>
</html>
