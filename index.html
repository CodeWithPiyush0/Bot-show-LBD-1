<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bot Show - Activity Game</title>

    <!-- Fonts: Rajdhani -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <!-- Preload critical Screen 1 images for faster first paint -->
    <link rel="preload" as="image" href="assets/images/BG.webp" />
    <link rel="preload" as="image" href="assets/images/orange_bot.webp" />
    <link rel="preload" as="image" href="assets/images/Sahdow_Purple_Bot.webp" />
    <link rel="preload" as="image" href="assets/images/White_blue_bot.webp" />
    <link rel="preload" as="image" href="assets/images/Question_template.webp" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/screen.css" />
    <link rel="stylesheet" href="css/screen2.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <!-- Game container: keeps the background and all game elements -->
    <main class="game" id="game">
        <div class="game__screen" id="stage">

            <!-- ===== SCREEN 1 - choose the bot ===== -->
            <section class="screen screen--1 is-active" id="screen-1" data-screen="1">

                <!-- Spotlight beam focused on the center (orange) bot -->
                <img
                    class="spotlight"
                    src="assets/images/spotlight.svg"
                    alt=""
                    aria-hidden="true"
                />

                <!-- Floor shadows & warm glow (recreated from Figma ellipses) -->
                <div class="floor floor--shadow floor--purple" aria-hidden="true"></div>
                <div class="floor floor--shadow floor--white" aria-hidden="true"></div>
                <div class="floor floor--shadow floor--orange" aria-hidden="true"></div>
                <div class="floor floor--glow" aria-hidden="true"></div>

                <!-- The three bots -->
                <img
                    class="bot bot--purple"
                    src="assets/images/Sahdow_Purple_Bot.webp"
                    alt="Purple bot"
                    data-bot="purple"
                />
                <img
                    class="bot bot--orange"
                    src="assets/images/orange_bot.webp"
                    alt="Orange bot"
                    data-bot="orange"
                />
                <img
                    class="bot bot--white-blue"
                    src="assets/images/White_blue_bot.webp"
                    alt="White and blue bot"
                    data-bot="white-blue"
                />

                <!-- Question banner at the top -->
                <div class="question">
                    <img
                        class="question__template"
                        src="assets/images/Question_template.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <video
                        class="question__avatar"
                        src="assets/videos/bite_talking.mp4"
                        muted
                        loop
                        autoplay
                        playsinline
                        preload="auto"
                        aria-hidden="true"
                    ></video>
                    <p class="question__text" data-text="Tap the bot to fix its batteries."></p>
                </div>

            </section>

            <!-- ===== SCREEN 2 - inside the bot (place the batteries) ===== -->
            <section class="screen screen--2" id="screen-2" data-screen="2">

                <!-- Gameplay content. Scaled down slightly while the
                     question banner is open, then back to normal. -->
                <div class="s2-content is-compact" id="s2-content">

                    <!-- Circuit-board panel (border + slots + connectors) -->
                    <img
                        class="panel"
                        src="assets/images/battery_slots.svg"
                        alt=""
                        aria-hidden="true"
                    />

                    <!-- Green glow overlay for the charged top slot.
                         Uses the standalone slot art so the glow hugs
                         its exact rounded shape. -->
                    <img
                        class="slot-glow slot-glow--big"
                        src="assets/images/Bigger_Slot.svg"
                        alt=""
                        aria-hidden="true"
                    />

                    <!-- Slot drop-zones (overlay the panel's recesses) -->
                    <div class="slot slot--big" data-slot="big" aria-hidden="true"></div>
                    <div class="slot slot--small-left" data-slot="small-left" aria-hidden="true"></div>
                    <div class="slot slot--small-right" data-slot="small-right" aria-hidden="true"></div>

                    <!-- Current flows through the orange connectors
                         (paths trace the exact connector centerlines). -->
                    <svg
                        class="charge-fx"
                        id="charge-fx"
                        viewBox="0 0 1920 1080"
                        preserveAspectRatio="none"
                        aria-hidden="true"
                    >
                        <!-- Green glow that hugs the connectors once charged -->
                        <g class="charge-glow">
                            <path d="M 653 560 L 759 406" />
                            <path d="M 1264 560 L 1166 405" />
                            <path d="M 838 636 L 1093 636" />
                        </g>
                        <!-- Travelling current pulses -->
                        <g class="charge-flow">
                            <path d="M 653 560 L 759 406" />
                            <path d="M 1264 560 L 1166 405" />
                            <path d="M 838 636 L 1093 636" />
                        </g>
                    </svg>

                    <!-- Battery trays at the bottom -->
                    <div class="tray tray--blue">
                        <div class="tray__inner"></div>
                        <div class="tray__deco tray__deco--top"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--bottom"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--left"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--right"><i></i><i></i><i></i></div>
                    </div>
                    <div class="tray tray--yellow">
                        <div class="tray__inner"></div>
                        <div class="tray__deco tray__deco--top"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--bottom"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--left"><i></i><i></i><i></i></div>
                        <div class="tray__deco tray__deco--right"><i></i><i></i><i></i></div>
                    </div>

                    <!-- Batteries are injected here by js/batteries.js -->

                </div>

                <!-- Question banner: opens on entry, types the prompt,
                     holds, then closes back to just the mascot face. -->
                <div class="question" id="question-2">
                    <img
                        class="question__template"
                        src="assets/images/Question_template.webp"
                        alt=""
                        aria-hidden="true"
                    />
                    <video
                        class="question__avatar"
                        src="assets/videos/bite_talking.mp4"
                        muted
                        loop
                        autoplay
                        playsinline
                        preload="auto"
                        aria-hidden="true"
                    ></video>
                    <p class="question__text" data-text="Drag the batteries in a small slots."></p>
                </div>

            </section>

        </div>
    </main>

    <!-- Scripts -->
    <script src="js/navigation.js" defer></script>
    <script src="js/intro.js" defer></script>
    <script src="js/batteries.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
